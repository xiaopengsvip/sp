<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#05050a" />
  <meta name="robots" content="noindex,nofollow" />
  <title>星海短视频 · Vercel</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <b>星海短视频</b>
        <span>YuJn API · Vercel · 成人确认</span>
      </div>
      <button id="refreshBtn" class="glass-btn">换一批</button>
    </header>

    <nav id="tabs" class="tabs"></nav>
    <section id="feed" class="feed" aria-label="短视频流"></section>

    <aside class="hint">
      <span>↑↓ / 滚轮切换</span>
      <span>空格播放暂停</span>
    </aside>
  </main>

  <div id="ageGate" class="age-gate">
    <div class="age-card">
      <h1>成人内容确认</h1>
      <p>本项目接入随机公开视频接口。请确认你已满 18 岁，并遵守当地法律法规。</p>
      <button id="enterBtn">我已满 18 岁，进入</button>
    </div>
  </div>

  <template id="videoTpl">
    <article class="video-card">
      <video playsinline webkit-playsinline loop preload="metadata"></video>
      <div class="shade"></div>
      <div class="info"><h2></h2><p></p></div>
      <div class="actions">
        <button class="like">♥</button>
        <button class="replay">↻</button>
        <button class="mute">🔇</button>
      </div>
      <div class="loading">加载中...</div>
    </article>
  </template>

  <script src="/app.js"></script>
</body>
</html>
